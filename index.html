/* ---------- LOGICA DI CALCOLO ---------- */

// quota maggiore (>=50) data due bordi opposti
const share = (a, b) => {
  a = Math.max(0, a); b = Math.max(0, b);
  const t = a + b;
  return t <= 0 ? 50 : (Math.max(a, b) / t) * 100;
};
const fmtRatio = (p) => `${Math.round(p)}/${100 - Math.round(p)}`;

// PSA: grado massimo consentito dalla SOLA centratura
function psaCentering(pF, pB) {
  let g;
  if (pF <= 55) g = 10;
  else if (pF <= 60) g = 9;
  else if (pF <= 65) g = 8;
  else if (pF <= 70) g = 7;
  else if (pF <= 80) g = 6;
  else if (pF <= 85) g = 5;
  else if (pF <= 90) g = 4;
  else g = 3;
  if (pB != null) {
    let gb;
    if (pB <= 75) gb = 10;
    else if (pB <= 90) gb = 9;
    else gb = 6;
    g = Math.min(g, gb);
  }
  return g;
}

// BGS: subgrade di centratura (fronte pesa di più; il retro fa da tetto)
function bgsCentering(pWorst, pBest, pB) {
  let s;
  if (pWorst <= 51 && pBest <= 51) s = 10;
  else if (pWorst <= 55) s = pBest <= 52 ? 9.5 : 9;
  else if (pWorst <= 57.5) s = 8.5;
  else if (pWorst <= 60) s = 8;
  else if (pWorst <= 62.5) s = 7.5;
  else if (pWorst <= 65) s = 7;
  else if (pWorst <= 70) s = 6;
  else if (pWorst <= 75) s = 5;
  else s = 4;
  if (pB != null) {
    let c;
    if (pB <= 60) c = 10;
    else if (pB <= 70) c = 9;
    else if (pB <= 80) c = 8;
    else if (pB <= 90) c = 7;
    else c = 6;
    s = Math.min(s, c);
  }
  return s;
}

const psaName = (g) => ({ 10: "Gem Mint", 9: "Mint", 8: "NM-MT", 7: "NM", 6: "EX-MT", 5: "EX", 4: "VG-EX", 3: "VG" }[Math.floor(g)] || "—");
const bgsName = (g) => {
  if (g >= 10) return "Pristine";
  if (g >= 9.5) return "Gem Mint";
  if (g >= 9) return "Mint";
  if (g >= 8) return "NM-MT";
  if (g >= 7) return "NM";
  return "EX-";
};

// BGS overall da 4 subgrade (stima: tetto a subgrade-min +0.5; soglie top per 9.5/10)
function bgsOverall(c, co, e, s) {
  const subs = [c, co, e, s];
  const low = Math.min(...subs);
  const avg = subs.reduce((a, b) => a + b, 0) / 4;
  const tens = subs.filter((x) => x === 10).length;
  if (tens === 4) return { g: 10, black: true };
  if (tens === 3 && low >= 9.5) return { g: 10, black: false };
  let cand = Math.round(avg * 2) / 2;
  cand = Math.min(cand, low + 0.5);
  if (cand >= 9.5 && low < 9) cand = 9;
  if (cand < 1) cand = 1;
  return { g: cand, black: false };
}

/* ---------- DRAGGABLE LINE ---------- */
function GuideLine({ axis, color, pos, onDrag, containerRef, locked }) {
  const drag = useRef(false);
  const onDown = (e) => {
    if (locked) return;
    e.preventDefault();
    e.stopPropagation();
    try { e.currentTarget.setPointerCapture(e.pointerId); } catch (_) {}
    drag.current = true;
  };
  const onMove = (e) => {
    if (!drag.current || locked) return;
    e.preventDefault();
    const r = containerRef.current.getBoundingClientRect();
    const f = axis === "v" ? (e.clientX - r.left) / r.width : (e.clientY - r.top) / r.height;
    onDrag(Math.max(0, Math.min(1, f)));
  };
  const onUp = (e) => {
    drag.current = false;
    try { e.currentTarget.releasePointerCapture(e.pointerId); } catch (_) {}
  };
  const style = axis === "v" ? { left: `${pos * 100}%`, borderColor: color } : { top: `${pos * 100}%`, borderColor: color };
  return (
    <div className={`cal-line ${axis}`} style={style}>
      <div className="grip" style={{ color, pointerEvents: locked ? "none" : "auto" }}
        onPointerDown={onDown} onPointerMove={onMove} onPointerUp={onUp} onPointerCancel={onUp} />
    </div>
  );
}

/* ---------- DE-SKEW PROSPETTICO (omografia + warp su canvas) ---------- */
const DEF_CORNERS = [{ x: 0.12, y: 0.08 }, { x: 0.88, y: 0.08 }, { x: 0.88, y: 0.92 }, { x: 0.12, y: 0.92 }];

function gauss(A, b) {
  const n = 8, M = A.map((r, i) => [...r, b[i]]);
  for (let c = 0; c < n; c++) {
    let piv = c;
    for (let r = c + 1; r < n; r++) if (Math.abs(M[r][c]) > Math.abs(M[piv][c])) piv = r;
    [M[c], M[piv]] = [M[piv], M[c]];
    const d = M[c][c] || 1e-9;
    for (let k = c; k <= n; k++) M[c][k] /= d;
    for (let r = 0; r < n; r++) if (r !== c) { const f = M[r][c]; for (let k = c; k <= n; k++) M[r][k] -= f * M[c][k]; }
  }
  return M.map((r) => r[n]);
}
function solveH(src, dst) {
  const A = [], b = [];
  for (let i = 0; i < 4; i++) {
    const [x, y] = src[i], [X, Y] = dst[i];
    A.push([x, y, 1, 0, 0, 0, -x * X, -y * X]); b.push(X);
    A.push([0, 0, 0, x, y, 1, -x * Y, -y * Y]); b.push(Y);
  }
  const h = gauss(A, b);
  return [h[0], h[1], h[2], h[3], h[4], h[5], h[6], h[7], 1];
}
function applyH(H, x, y) { const d = H[6] * x + H[7] * y + H[8]; return [(H[0] * x + H[1] * y + H[2]) / d, (H[3] * x + H[4] * y + H[5]) / d]; }

function warpImage(dataUrl, corners, ratio = 63 / 88) {
  return new Promise((resolve, reject) => {
    const im = new Image();
    im.onload = () => {
      try {
        const maxd = 1500, sc = Math.min(1, maxd / Math.max(im.naturalWidth, im.naturalHeight));
        const cw = Math.round(im.naturalWidth * sc), ch = Math.round(im.naturalHeight * sc);
        const sCv = document.createElement("canvas"); sCv.width = cw; sCv.height = ch;
        const sx = sCv.getContext("2d"); sx.drawImage(im, 0, 0, cw, ch);
        const sd = sx.getImageData(0, 0, cw, ch).data;
        const srcQuad = corners.map((c) => [c.x * cw, c.y * ch]);
        const outH = 1000, outW = Math.round(outH * ratio);
        const dstRect = [[0, 0], [outW - 1, 0], [outW - 1, outH - 1], [0, outH - 1]];
        const H = solveH(dstRect, srcQuad);
        const oCv = document.createElement("canvas"); oCv.width = outW; oCv.height = outH;
        const octx = oCv.getContext("2d"); const oimg = octx.createImageData(outW, outH); const od = oimg.data;
        for (let v = 0; v < outH; v++) for (let u = 0; u < outW; u++) {
          const [fx, fy] = applyH(H, u, v); const ix = Math.round(fx), iy = Math.round(fy); const oi = (v * outW + u) * 4;
          if (ix >= 0 && ix < cw && iy >= 0 && iy < ch) { const si = (iy * cw + ix) * 4; od[oi] = sd[si]; od[oi + 1] = sd[si + 1]; od[oi + 2] = sd[si + 2]; od[oi + 3] = 255; }
          else { od[oi] = 20; od[oi + 1] = 20; od[oi + 2] = 20; od[oi + 3] = 255; }
        }
        octx.putImageData(oimg, 0, 0);
        resolve(oCv.toDataURL("image/jpeg", 0.92));
      } catch (e) { reject(e); }
    };
    im.onerror = reject;
    im.src = dataUrl;
  });
}

function CornerHandle({ pt, onDrag, containerRef }) {
  const drag = useRef(false);
  const down = (e) => { e.preventDefault(); e.stopPropagation(); try { e.currentTarget.setPointerCapture(e.pointerId); } catch (_) {} drag.current = true; };
  const move = (e) => {
    if (!drag.current) return; e.preventDefault();
    const r = containerRef.current.getBoundingClientRect();
    onDrag(Math.max(0, Math.min(1, (e.clientX - r.left) / r.width)), Math.max(0, Math.min(1, (e.clientY - r.top) / r.height)));
  };
  const up = (e) => { drag.current = false; try { e.currentTarget.releasePointerCapture(e.pointerId); } catch (_) {} };
  return <div className="cal-corner" style={{ left: `${pt.x * 100}%`, top: `${pt.y * 100}%` }} onPointerDown={down} onPointerMove={move} onPointerUp={up} onPointerCancel={up} />;
}

/* =================================================================== */
function Calibro() {
  const [mode, setMode] = useState("foto"); // foto | manuale
  const [vintage, setVintage] = useState(false);

  // input manuale (mm)
  const [m, setM] = useState({ l: 6, r: 5, t: 7, b: 6, bl: "", br: "", bt: "", bb: "" });

  // dimensioni carta (controllo trimming)
  const [dim, setDim] = useState({ w: "", h: "" });

  // foto / linee — fronte e retro
  const LINES_DEF = { ol: 0.08, il: 0.2, ir: 0.8, or: 0.92, ot: 0.06, it: 0.16, ib: 0.84, ob: 0.94 };
  const [face, setFace] = useState("front"); // front | back
  const [imgs, setImgs] = useState({ front: null, back: null });
  const [imgErr, setImgErr] = useState({ front: false, back: false });
  const [linesByFace, setLinesByFace] = useState({ front: { ...LINES_DEF }, back: { ...LINES_DEF } });
  const [filter, setFilter] = useState("normale"); // filtro superficie
  const [cardType, setCardType] = useState({ front: "bordata", back: "western" });
  const [rotByFace, setRotByFace] = useState({ front: 0, back: 0 });
  const [grid, setGrid] = useState(false);
  const [persp, setPersp] = useState(false);
  const [cornersByFace, setCornersByFace] = useState({ front: DEF_CORNERS, back: DEF_CORNERS });
  const [warping, setWarping] = useState(false);
  const [val, setVal] = useState({ q: "", lang: "it", company: "PSA", grade: "10" });
  const [whiteResult, setWhiteResult] = useState(null);
  const stageRef = useRef(null);
  const fileRef = useRef(null);

  // condizione (parte da 10: il voto riflette la sola centratura finché non segnali usura)
  const [cond, setCond] = useState({ corners: 10, edges: 10, surface: 10 });
  const [condTouched, setCondTouched] = useState(false);

  // lente d'ingrandimento
  const [loupe, setLoupe] = useState(false);
  const [zoom, setZoom] = useState(3);
  const [lp, setLp] = useState({ active: false, x: 0, y: 0, fx: 0, fy: 0, w: 1, h: 1 });

  // carte salvate
  const [cardName, setCardName] = useState("");
  const [savedCards, setSavedCards] = useState([]);
  const [backup, setBackup] = useState(null);

  useEffect(() => {
    (async () => {
      try {
        if (typeof window !== "undefined" && window.storage) {
          const r = await window.storage.get("calibro:cards");
          if (r && r.value) setSavedCards(JSON.parse(r.value));
        }
      } catch (e) { /* nessun dato salvato */ }
    })();
  }, []);

  useEffect(() => { setWhiteResult(null); }, [face]);

  const analyzeWhitening = () => {
    const src = imgs[face];
    if (!src) return;
    setWhiteResult({ loading: true });
    const im = new Image();
    im.onload = () => {
      const W = im.naturalWidth, H = im.naturalHeight;
      const cv = document.createElement("canvas");
      cv.width = W; cv.height = H;
      const ctx = cv.getContext("2d");
      ctx.drawImage(im, 0, 0);
      const L = linesByFace[face];
      const x0 = L.ol * W, x1 = L.or * W, y0 = L.ot * H, y1 = L.ob * H;
      const cardW = x1 - x0, cardH = y1 - y0;
      if (cardW <= 4 || cardH <= 4) { setWhiteResult({ error: true }); return; }
      const strip = Math.max(3, Math.round(Math.min(cardW, cardH) * 0.022));
      const analyze = (rx0, ry0, rx1, ry1) => {
        rx0 = Math.max(0, Math.round(rx0)); ry0 = Math.max(0, Math.round(ry0));
        rx1 = Math.min(W, Math.round(rx1)); ry1 = Math.min(H, Math.round(ry1));
        if (rx1 <= rx0 || ry1 <= ry0) return { bright: 0, total: 0 };
        const d = ctx.getImageData(rx0, ry0, rx1 - rx0, ry1 - ry0).data;
        const lum = [];
        for (let i = 0; i < d.length; i += 4) lum.push(0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2]);
        const sorted = [...lum].sort((a, b) => a - b);
        const med = sorted[Math.floor(sorted.length / 2)] || 0;
        const thr = Math.max(165, med + 45);
        let bright = 0;
        for (let i = 0; i < d.length; i += 4) {
          const Y = 0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2];
          const mx = Math.max(d[i], d[i + 1], d[i + 2]), mn = Math.min(d[i], d[i + 1], d[i + 2]);
          const sat = mx === 0 ? 0 : (mx - mn) / mx;
          if (Y > thr && sat < 0.45) bright++;
        }
        return { bright, total: lum.length };
      };
      const L_ = analyze(x0, y0, x0 + strip, y1);
      const R_ = analyze(x1 - strip, y0, x1, y1);
      const T_ = analyze(x0, y0, x1, y0 + strip);
      const B_ = analyze(x0, y1 - strip, x1, y1);
      // angoli: i due segmenti di bordo che si incontrano allo spigolo
      const cn = Math.max(strip * 2, Math.round(Math.min(cardW, cardH) * 0.14));
      const comb = (a, b) => ({ bright: a.bright + b.bright, total: a.total + b.total });
      const cTL = comb(analyze(x0, y0, x0 + cn, y0 + strip), analyze(x0, y0, x0 + strip, y0 + cn));
      const cTR = comb(analyze(x1 - cn, y0, x1, y0 + strip), analyze(x1 - strip, y0, x1, y0 + cn));
      const cBL = comb(analyze(x0, y1 - strip, x0 + cn, y1), analyze(x0, y1 - cn, x0 + strip, y1));
      const cBR = comb(analyze(x1 - cn, y1 - strip, x1, y1), analyze(x1 - strip, y1 - cn, x1, y1));
      const tb = L_.bright + R_.bright + T_.bright + B_.bright;
      const tp = L_.total + R_.total + T_.total + B_.total;
      const pct = tp ? (tb / tp) * 100 : 0;
      const ps = (a) => (a.total ? (a.bright / a.total) * 100 : 0);
      const bucket = (p) => (p > 10 ? 6 : p > 5 ? 7 : p > 2 ? 8 : p > 0.6 ? 9 : 10);
      const corners = { tl: ps(cTL), tr: ps(cTR), bl: ps(cBL), br: ps(cBR) };
      const worstC = Math.max(corners.tl, corners.tr, corners.bl, corners.br);
      setWhiteResult({ pct, g: bucket(pct), sides: { sx: ps(L_), dx: ps(R_), alto: ps(T_), basso: ps(B_) }, corners, worstC, gCorner: bucket(worstC) });
    };
    im.onerror = () => setWhiteResult({ error: true });
    im.src = src;
  };

  const stageMove = (e) => {
    if (!loupe || !imgs[face]) return;
    const r = stageRef.current.getBoundingClientRect();
    const x = e.clientX - r.left, y = e.clientY - r.top;
    setLp({ active: true, x, y, fx: x / r.width, fy: y / r.height, w: r.width, h: r.height });
  };
  const stageEnd = () => setLp((p) => ({ ...p, active: false }));

  const setLine = (k, v) => setLinesByFace((p) => ({ ...p, [face]: { ...p[face], [k]: v } }));
  const nudge = (k, delta) => setLine(k, Math.max(0, Math.min(1, (linesByFace[face][k] ?? 0) + delta)));
  const snapEdges = () => {
    const url = imgs[face];
    if (!url) return;
    const im = new Image();
    im.onload = () => {
      try {
        const maxd = 1200, sc = Math.min(1, maxd / Math.max(im.naturalWidth, im.naturalHeight));
        const W = Math.round(im.naturalWidth * sc), H = Math.round(im.naturalHeight * sc);
        const cv = document.createElement("canvas"); cv.width = W; cv.height = H;
        const ctx = cv.getContext("2d"); ctx.drawImage(im, 0, 0, W, H);
        const d = ctx.getImageData(0, 0, W, H).data;
        const lum = (x, y) => { const i = (y * W + x) * 4; return 0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2]; };
        const L = linesByFace[face];
        const yA = Math.floor(H * 0.28), yB = Math.floor(H * 0.72);
        const xA = Math.floor(W * 0.28), xB = Math.floor(W * 0.72);
        const bestX = (f) => {
          const x0 = Math.max(2, Math.floor((f - 0.06) * W)), x1 = Math.min(W - 3, Math.ceil((f + 0.06) * W));
          let bx = Math.round(f * W), bg = -1;
          for (let x = x0; x <= x1; x++) { let g = 0; for (let y = yA; y < yB; y += 3) g += Math.abs(lum(x + 1, y) - lum(x - 1, y)); if (g > bg) { bg = g; bx = x; } }
          return bx / W;
        };
        const bestY = (f) => {
          const y0 = Math.max(2, Math.floor((f - 0.06) * H)), y1 = Math.min(H - 3, Math.ceil((f + 0.06) * H));
          let by = Math.round(f * H), bg = -1;
          for (let y = y0; y <= y1; y++) { let g = 0; for (let x = xA; x < xB; x += 3) g += Math.abs(lum(x, y + 1) - lum(x, y - 1)); if (g > bg) { bg = g; by = y; } }
          return by / H;
        };
        const next = { ...L, ol: bestX(L.ol), il: bestX(L.il), ir: bestX(L.ir), or: bestX(L.or), ot: bestY(L.ot), it: bestY(L.it), ib: bestY(L.ib), ob: bestY(L.ob) };
        setLinesByFace((p) => ({ ...p, [face]: next }));
      } catch (e) { /* snap non riuscito */ }
    };
    im.src = url;
  };
  const setCardKind = (k) => {
    setCardType((p) => ({ ...p, [face]: k }));
    const d = TYPE_LINES[k];
    if (d) setLinesByFace((p) => ({ ...p, [face]: { ...p[face], il: d.il, ir: d.ir, it: d.it, ib: d.ib } }));
  };
  const setRot = (v) => setRotByFace((p) => ({ ...p, [face]: Math.max(-20, Math.min(20, v)) }));
  const setCorner = (i, x, y) => setCornersByFace((p) => ({ ...p, [face]: p[face].map((c, j) => (j === i ? { x, y } : c)) }));
  const applyPerspective = async () => {
    if (!imgs[face]) return;
    setWarping(true);
    try {
      const url = await warpImage(imgs[face], cornersByFace[face]);
      setImgs((p) => ({ ...p, [face]: url }));
      setRotByFace((p) => ({ ...p, [face]: 0 }));
      setCornersByFace((p) => ({ ...p, [face]: DEF_CORNERS }));
      setPersp(false);
    } catch (e) { /* warp non riuscito */ }
    setWarping(false);
  };

  const onFile = (e) => {
    const f = e.target.files?.[0];
    if (!f) return;
    setImgErr((p) => ({ ...p, [face]: false }));
    setImgs((p) => ({ ...p, [face]: null }));
    setWhiteResult(null);
    const reader = new FileReader();
    reader.onload = (ev) => setImgs((p) => ({ ...p, [face]: ev.target.result }));
    reader.onerror = () => setImgErr((p) => ({ ...p, [face]: true }));
    reader.readAsDataURL(f);
  };

  /* --- centratura calcolata --- */
  const cent = useMemo(() => {
    const eps = 0.004;
    const axes = (L) => {
      const lw = L.il - L.ol, rw = L.or - L.ir, tw = L.it - L.ot, bw = L.ob - L.ib;
      return {
        lr: lw <= eps || rw <= eps ? null : share(lw, rw),
        tb: tw <= eps || bw <= eps ? null : share(tw, bw),
      };
    };
    let lrF = 50, tbF = 50, lrB = null, tbB = null, warn = false;
    if (mode === "foto") {
      if (imgs.front) { const r = axes(linesByFace.front); lrF = r.lr; tbF = r.tb; if (r.lr == null || r.tb == null) warn = true; }
      if (imgs.back) { const r = axes(linesByFace.back); lrB = r.lr; tbB = r.tb; if (r.lr == null || r.tb == null) warn = true; }
    } else {
      lrF = share(+m.l || 0, +m.r || 0);
      tbF = share(+m.t || 0, +m.b || 0);
      if (m.bl !== "" && m.br !== "") lrB = share(+m.bl, +m.br);
      if (m.bt !== "" && m.bb !== "") tbB = share(+m.bt, +m.bb);
    }
    const fvals = [lrF, tbF].filter((v) => v != null);
    const worst = fvals.length ? Math.max(...fvals) : null;
    const best = fvals.length ? Math.min(...fvals) : null;
    const bvals = [lrB, tbB].filter((v) => v != null);
    const backWorst = bvals.length ? Math.max(...bvals) : null;
    return { lrF, tbF, lrB, tbB, worst, best, backWorst, warn };
  }, [mode, imgs, linesByFace, m]);

  /* --- controllo trimming dalle dimensioni --- */
  const trim = useMemo(() => {
    const w = +dim.w, h = +dim.h;
    if (!w || !h) return null;
    // standard: 63.5 x 88.9 mm. Sotto-misura > tolleranza => possibile taglio
    const undW = 63.5 - w, undH = 88.9 - h;
    if (undW > 0.6 || undH > 0.6) return "trim";
    if (Math.abs(w / h - 63.5 / 88.9) > 0.03) return "ratio";
    return "ok";
  }, [dim]);

  /* --- gradi --- */
  const psaCent = psaCentering(cent.worst ?? 50, cent.backWorst);
  const psaFactors = [psaCent, cond.corners, cond.edges, cond.surface];
  let psa = Math.min(...psaFactors);
  if (vintage && psaCent < 10) psa = Math.min(Math.max(psaCent + 0, psa) + 0, psa); // nota: leeway gestita nei flag
  const psaLimitIdx = psaFactors.indexOf(psa);

  const bgsCent = bgsCentering(cent.worst ?? 50, cent.best ?? 50, cent.backWorst);
  const bgs = bgsOverall(bgsCent, cond.corners, cond.edges, cond.surface);
  const bgsSubs = [
    { k: "Cent", v: bgsCent },
    { k: "Ang", v: cond.corners },
    { k: "Bordi", v: cond.edges },
    { k: "Super", v: cond.surface },
  ];
  const bgsLow = Math.min(...bgsSubs.map((s) => s.v));

  /* --- verdetto --- */
  const verdict = useMemo(() => {
    if (trim === "trim") return { tone: "bad", badge: "Non gradabile", txt: "La carta risulta sotto-misura: possibile taglio (trim). PSA/BGS la rifiutano o la marcano come alterata. Non inviare." };
    if (!condTouched) return { tone: "ok", badge: "Da valutare", txt: "Questo è solo il tetto dalla centratura, non il voto finale. Imposta bordi, angoli e superficie qui sotto: difetti come il whitening sui bordi abbassano il grado reale." };
    const top = Math.max(psa, bgs.g);
    if (psa >= 9.5 || bgs.g >= 9.5) return { tone: "great", badge: "Candidato Gem", txt: vintage ? "Numeri da gemma anche per una vintage: invio fortemente consigliato, la rivalutazione è alta." : "Numeri da gem mint. Vale l'invio: il salto di valore 9→10 è moltiplicativo." };
    if (top >= 9) return { tone: "good", badge: "Conviene", txt: "Solido Mint 9. Su carte di valore l'invio rende; su comuni moderne valuta il costo rispetto al delta 9 vs grezzo." };
    if (top >= 8) return { tone: "ok", badge: "Borderline", txt: "Tappo a NM-MT 8. Conviene gradare solo se la carta ha valore alto da grezza o è vintage ricercata." };
    return { tone: "bad", badge: "Sconsigliato", txt: "Su carte moderne il grado previsto non copre i costi di gradazione. Tieni la carta grezza." };
  }, [psa, bgs.g, trim, vintage, condTouched]);

  const toneColor = { great: "var(--grn)", good: "var(--cy)", ok: "var(--yl)", bad: "var(--mg)" }[verdict.tone];

  const persist = (arr) => {
    try { if (typeof window !== "undefined" && window.storage) window.storage.set("calibro:cards", JSON.stringify(arr), false); } catch (e) { /* salvataggio non disponibile */ }
  };
  const saveCard = () => {
    const entry = {
      id: Date.now(),
      name: cardName.trim() || `Carta ${savedCards.length + 1}`,
      psa: trim === "trim" ? "—" : (psa % 1 ? psa.toFixed(1) : String(psa)),
      bgs: trim === "trim" ? "—" : (bgs.g % 1 ? bgs.g.toFixed(1) : String(bgs.g)),
      black: bgs.black,
      front: cent.worst == null ? "—" : fmtRatio(cent.worst),
      tone: verdict.tone,
    };
    const arr = [entry, ...savedCards];
    setSavedCards(arr); persist(arr); setCardName("");
  };
  const removeCard = (id) => {
    const arr = savedCards.filter((c) => c.id !== id);
    setSavedCards(arr); persist(arr);
  };

  const reset = () => {
    setM({ l: 6, r: 5, t: 7, b: 6, bl: "", br: "", bt: "", bb: "" });
    setCond({ corners: 10, edges: 10, surface: 10 });
    setCondTouched(false);
    setDim({ w: "", h: "" });
    setImgs({ front: null, back: null });
    setImgErr({ front: false, back: false });
    setLinesByFace({ front: { ...LINES_DEF }, back: { ...LINES_DEF } });
    setFace("front");
    setFilter("normale");
    setCardType({ front: "bordata", back: "western" });
    setRotByFace({ front: 0, back: 0 });
    setGrid(false);
    setPersp(false);
    setCornersByFace({ front: DEF_CORNERS, back: DEF_CORNERS });
    setVal({ q: "", lang: "it", company: "PSA", grade: "10" });
    setWhiteResult(null);
  };

  // derivati per la faccia attiva
  const curImg = imgs[face];
  const curErr = imgErr[face];
  const curLines = linesByFace[face];
  const rot = rotByFace[face];
  const curCorners = cornersByFace[face];
  const FILTERS = { normale: "none", bn: "grayscale(1)", contrasto: "grayscale(1) contrast(2.2) brightness(1.12)", estremo: "grayscale(1) contrast(3.4) brightness(1.28)", invertito: "grayscale(1) invert(1) contrast(1.5)" };
  const filterCss = FILTERS[filter] || "none";
  const curR = face === "front" ? { lr: cent.lrF, tb: cent.tbF } : { lr: cent.lrB, tb: cent.tbB };

  // link valore di mercato (venduti)
  const gradeOpts = val.company === "BGS" ? ["10", "9.5", "9", "8.5", "8"] : ["10", "9", "8", "7"];
  const _langWord = { it: "italiano", en: "english", jp: "japanese" }[val.lang];
  const _gradeWord = val.company === "Raw" ? "" : `${val.company} ${val.grade}`;
  const _q = [val.q, _langWord, _gradeWord].filter(Boolean).join(" ").trim();
  const ebayUrl = `https://www.ebay.it/sch/i.html?_nkw=${encodeURIComponent(_q || "pokemon")}&LH_Sold=1&LH_Complete=1&_sop=13`;

  return (
    <div className="cal-root">
      <style>{STYLES}</style>
      <div className="cal-wrap">
        {/* header */}
        <div className="cal-eyebrow">Pre-screening · misura prima di pagare</div>
        <div className="cal-h1">CALI<b>BRO</b></div>
        <div className="cal-sub">Verifica proporzioni, centratura e condizione di una carta per stimare il grado PSA e BGS — e capire se è gradabile.</div>

        {/* ===== SLAB VERDETTO (live) ===== */}
        <div className="cal-section" style={{ padding: 0, overflow: "hidden", border: "none", background: "transparent" }}>
          <div className="cal-slab">
            <div className="cal-slabtop">
              <div className="cal-grade">
                <div className="co">PSA</div>
                <div className="num" style={{ color: toneColor }}>{trim === "trim" ? "—" : psa % 1 ? psa.toFixed(1) : psa}</div>
                <div className="lab">{trim === "trim" ? "Reject" : psaName(psa)}</div>
              </div>
              <div className="cal-divider" />
              <div className="cal-grade">
                <div className="co">BGS</div>
                <div className="num" style={{ color: toneColor }}>{trim === "trim" ? "—" : bgs.g % 1 ? bgs.g.toFixed(1) : bgs.g}</div>
                <div className="lab">{trim === "trim" ? "Reject" : (bgs.black ? "Black Label" : bgsName(bgs.g))}</div>
              </div>
              <div className="cal-divider" />
              <div className="cal-verdict">
                <span className="cal-badge" style={{ background: toneColor, color: "#0c0d11" }}>{verdict.badge}</span>
                <p>{verdict.txt}</p>
              </div>
            </div>
            {/* subgrade BGS */}
            <div className="cal-subs">
              {bgsSubs.map((s) => (
                <div key={s.k} className={`cal-subc ${s.v === bgsLow ? "weak" : ""}`}>
                  <div className="sk">{s.k}</div>
                  <div className="sv">{s.v % 1 ? s.v.toFixed(1) : s.v}</div>
                </div>
              ))}
            </div>
            {/* flags */}
            <div className="cal-flagrow">
              {cent.warn && (
                <span className="cal-flag" style={{ color: "var(--mg)", borderColor: "currentColor" }}><AlertTriangle size={13} /> Crocino a zero — sistema alto/basso o sx/dx</span>
              )}
              {cond.corners === 10 && cond.edges === 10 && cond.surface === 10 && (
                <span className="cal-flag" style={{ color: "var(--yl)", borderColor: "currentColor" }}><AlertTriangle size={13} /> Condizione non valutata — voto provvisorio</span>
              )}
              <span className="cal-flag" style={{ color: cent.worst == null ? "var(--mut)" : cent.worst <= 55 ? "var(--grn)" : cent.worst <= 60 ? "var(--yl)" : "var(--mg)", borderColor: "currentColor" }}>
                <Crosshair size={13} /> Fronte {cent.worst == null ? "—" : fmtRatio(cent.worst)}
              </span>
              {cent.backWorst != null && (
                <span className="cal-flag" style={{ color: "var(--mut)", borderColor: "var(--line)" }}>
                  <Layers size={13} /> Retro {fmtRatio(cent.backWorst)}
                </span>
              )}
              <span className="cal-flag" style={{ color: "var(--mut)", borderColor: "var(--line)" }}>
                Limite: {["Centratura", "Angoli", "Bordi", "Superficie"][psaLimitIdx]}
              </span>
              {trim === "ratio" && <span className="cal-flag" style={{ color: "var(--yl)", borderColor: "currentColor" }}><AlertTriangle size={13} /> Proporzioni anomale</span>}
              {trim === "ok" && <span className="cal-flag" style={{ color: "var(--grn)", borderColor: "currentColor" }}><Check size={13} /> Dimensioni regolari</span>}
              {vintage && psaCent < 10 && <span className="cal-flag" style={{ color: "var(--cy)", borderColor: "currentColor" }}><Info size={13} /> Vintage: 5% di tolleranza fronte</span>}
            </div>
            {!condTouched && trim !== "trim" && (
              <div style={{ padding: "10px 16px", borderTop: "1px solid var(--line)", background: "rgba(245,197,24,.08)", fontSize: 12.5, color: "var(--yl)", lineHeight: 1.45 }}>
                ⚠ Tetto dalla centratura — condizione non ancora valutata. Controlla bordi, angoli e superficie qui sotto: whitening e graffi fanno scendere il voto.
              </div>
            )}
          </div>
          <div className="cal-row" style={{ marginTop: 12, justifyContent: "space-between" }}>
            <div className="cal-toggle">
              <button className={!vintage ? "on" : ""} onClick={() => setVintage(false)}>Moderna</button>
              <button className={vintage ? "on" : ""} onClick={() => setVintage(true)}>Vintage</button>
            </div>
            <button className="cal-btn" onClick={reset}><RotateCcw size={14} /> Azzera</button>
          </div>
        </div>

        {/* ===== 1. CENTRATURA ===== */}
        <div className="cal-section">
          <div className="cal-step"><div className="cal-stepn">1</div><div className="cal-stept">Centratura</div></div>
          <div className="cal-tabs">
            <button className={`cal-tab ${mode === "foto" ? "on" : ""}`} onClick={() => setMode("foto")}>Misura su foto</button>
            <button className={`cal-tab ${mode === "manuale" ? "on" : ""}`} onClick={() => setMode("manuale")}>Inserimento mm</button>
          </div>

          {mode === "foto" ? (
            <>
              <div className="cal-hint">Trascina i 2 crocini <span className="cy">ciano</span> sui bordi esterni della carta e i 2 <span className="mg">magenta</span> dove inizia l'immagine/cornice, per ogni asse. Carica sia il fronte sia il retro.</div>
              {/* selettore faccia */}
              <div className="cal-toggle" style={{ marginBottom: 8 }}>
                <button className={face === "front" ? "on" : ""} onClick={() => setFace("front")}>Fronte{imgs.front ? " ✓" : ""}</button>
                <button className={face === "back" ? "on" : ""} onClick={() => setFace("back")}>Retro{imgs.back ? " ✓" : ""}</button>
              </div>
              {/* selettore tipo carta (dipende dalla faccia) */}
              <div className="cal-toggle" style={{ marginBottom: 6 }}>
                {(face === "front"
                  ? [["bordata", "Con bordo"], ["fullart", "Full-art"]]
                  : [["western", "Western EN/IT"], ["jp", "Giapponese"]]
                ).map(([k, lab]) => (
                  <button key={k} className={cardType[face] === k ? "on" : ""} onClick={() => setCardKind(k)}>{lab}</button>
                ))}
              </div>
              <div className="cal-mini" style={{ marginBottom: 10 }}>{TYPE_HINT[cardType[face]]}</div>
              <div className={`cal-stage ${curImg && !curErr ? "has-img" : ""}`} ref={stageRef}
                onPointerMove={loupe ? stageMove : undefined}
                onPointerDown={loupe ? stageMove : undefined}
                onPointerUp={loupe ? stageEnd : undefined}
                onPointerLeave={loupe ? stageEnd : undefined}>
                {curImg && !curErr ? (
                  <img src={curImg} alt={face === "front" ? "fronte" : "retro"} style={{ filter: filterCss, transform: `rotate(${rot}deg)` }} onError={() => setImgErr((p) => ({ ...p, [face]: true }))} />
                ) : curErr ? (
                  <button className="cal-drop" onClick={() => fileRef.current?.click()} style={{ background: "none", border: "none", color: "inherit", cursor: "pointer" }}>
                    <AlertTriangle className="ic" style={{ color: "var(--yl)" }} />
                    <div>Questa immagine non è visualizzabile (probabile formato HEIC dell'iPhone). Tocca per scegliere un JPG/PNG, o carica uno screenshot della foto.</div>
                  </button>
                ) : (
                  <button className="cal-drop" onClick={() => fileRef.current?.click()} style={{ background: "none", border: "none", color: "inherit", cursor: "pointer" }}>
                    <Upload className="ic" />
                    <div>Tocca per caricare la foto del {face === "front" ? "fronte" : "retro"}</div>
                  </button>
                )}
                {curImg && !curErr && !persp && (
                  <>
                    <GuideLine axis="v" color="var(--cy)" pos={curLines.ol} onDrag={(v) => setLine("ol", v)} containerRef={stageRef} locked={loupe} />
                    <GuideLine axis="v" color="var(--mg)" pos={curLines.il} onDrag={(v) => setLine("il", v)} containerRef={stageRef} locked={loupe} />
                    <GuideLine axis="v" color="var(--mg)" pos={curLines.ir} onDrag={(v) => setLine("ir", v)} containerRef={stageRef} locked={loupe} />
                    <GuideLine axis="v" color="var(--cy)" pos={curLines.or} onDrag={(v) => setLine("or", v)} containerRef={stageRef} locked={loupe} />
                    <GuideLine axis="h" color="var(--cy)" pos={curLines.ot} onDrag={(v) => setLine("ot", v)} containerRef={stageRef} locked={loupe} />
                    <GuideLine axis="h" color="var(--mg)" pos={curLines.it} onDrag={(v) => setLine("it", v)} containerRef={stageRef} locked={loupe} />
                    <GuideLine axis="h" color="var(--mg)" pos={curLines.ib} onDrag={(v) => setLine("ib", v)} containerRef={stageRef} locked={loupe} />
                    <GuideLine axis="h" color="var(--cy)" pos={curLines.ob} onDrag={(v) => setLine("ob", v)} containerRef={stageRef} locked={loupe} />
                  </>
                )}
                {persp && curImg && !curErr && (
                  <>
                    <svg className="cal-perspsvg" viewBox="0 0 100 100" preserveAspectRatio="none">
                      <polygon points={curCorners.map((c) => `${c.x * 100},${c.y * 100}`).join(" ")} fill="rgba(31,201,212,.12)" stroke="rgb(31,201,212)" strokeWidth="0.4" />
                    </svg>
                    {curCorners.map((pt, i) => <CornerHandle key={i} pt={pt} onDrag={(x, y) => setCorner(i, x, y)} containerRef={stageRef} />)}
                  </>
                )}
                {loupe && curImg && !curErr && lp.active && (
                  <div className="cal-loupe" style={{
                    left: lp.x, top: lp.y,
                    backgroundImage: `url(${curImg})`,
                    backgroundSize: `${lp.w * zoom}px ${lp.h * zoom}px`,
                    backgroundPosition: `${-(lp.fx * lp.w * zoom - 66)}px ${-(lp.fy * lp.h * zoom - 66)}px`,
                    filter: filterCss,
                  }} />
                )}
                {grid && curImg && !curErr && <div className="cal-grid-ov" />}
              </div>
              <input ref={fileRef} className="cal-hide-file" type="file" accept="image/*" onChange={onFile} />
              <div className="cal-legend">
                <span><i className="cal-swatch cy" /> bordo esterno carta</span>
                <span><i className="cal-swatch mg" /> inizio immagine / cornice</span>
                {curImg && <button className="cal-btn" style={{ padding: "4px 9px", fontSize: 12 }} onClick={() => fileRef.current?.click()}>Cambia foto</button>}
              </div>
              {curImg && (
                <div style={{ marginTop: 10 }}>
                  <div className="cal-row" style={{ alignItems: "center", flexWrap: "nowrap" }}>
                    <span style={{ fontSize: 11, color: "var(--mut)", fontFamily: "'Space Mono',monospace", textTransform: "uppercase", letterSpacing: ".06em", flex: "none" }}>Raddrizza</span>
                    <button className="cal-btn" style={{ padding: "4px 10px", flex: "none" }} onClick={() => setRot(Math.round((rot - 0.5) * 10) / 10)}>−</button>
                    <input className="cal-range" type="range" min={-20} max={20} step={0.5} value={rot} onChange={(e) => setRot(parseFloat(e.target.value))} style={{ flex: 1, minWidth: 0 }} />
                    <button className="cal-btn" style={{ padding: "4px 10px", flex: "none" }} onClick={() => setRot(Math.round((rot + 0.5) * 10) / 10)}>+</button>
                    <span style={{ fontFamily: "'Space Mono',monospace", fontSize: 12, color: "var(--txt)", width: 44, textAlign: "right", flex: "none" }}>{rot.toFixed(1)}°</span>
                  </div>
                  <div className="cal-mini">Ruota finché i bordi della carta sono dritti (paralleli ai crocini ciano), poi posiziona i crocini. {rot !== 0 && <button onClick={() => setRot(0)} style={{ background: "none", border: "none", color: "var(--cy)", cursor: "pointer", padding: 0, font: "inherit" }}>↺ azzera</button>}</div>
                </div>
              )}
              {curImg && (
                <>
                  {/* filtro superficie B/N */}
                  <div className="cal-row" style={{ marginTop: 10, alignItems: "center" }}>
                    <span style={{ fontSize: 11, color: "var(--mut)", fontFamily: "'Space Mono',monospace", textTransform: "uppercase", letterSpacing: ".06em" }}>Superficie</span>
                    <div className="cal-toggle">
                      {[["normale", "Colore"], ["bn", "B/N"], ["contrasto", "Contrasto"], ["estremo", "Estremo"], ["invertito", "Invert"]].map(([k, lab]) => (
                        <button key={k} className={filter === k ? "on" : ""} onClick={() => setFilter(k)}>{lab}</button>
                      ))}
                    </div>
                  </div>
                  {filter !== "normale" && <div className="cal-mini">Filtro per far emergere graffi e print line: usalo con la lente. Non altera la misura dei bordi.</div>}
                  <div className="cal-row" style={{ marginTop: 10 }}>
                    <button className={`cal-btn ${loupe ? "on" : ""}`} onClick={() => setLoupe((v) => !v)} style={loupe ? { borderColor: "var(--mg)", color: "var(--mg)" } : {}}>
                      <ZoomIn size={14} /> Lente {loupe ? "attiva" : ""}
                    </button>
                    <button className={`cal-btn ${grid ? "on" : ""}`} onClick={() => setGrid((v) => !v)} style={grid ? { borderColor: "var(--yl)", color: "var(--yl)" } : {}}>▦ Griglia</button>
                    {loupe && (
                      <div className="cal-toggle">
                        {[2, 3, 4].map((z) => (
                          <button key={z} className={zoom === z ? "on" : ""} onClick={() => setZoom(z)}>{z}x</button>
                        ))}
                      </div>
                    )}
                    {loupe && <span style={{ fontSize: 11.5, color: "var(--mut)" }}>Passa il dito sulla carta per ispezionare</span>}
                  </div>
                  <div className="cal-row" style={{ marginTop: 8 }}>
                    <button className={`cal-btn ${persp ? "on" : ""}`} onClick={() => setPersp((v) => !v)} style={persp ? { borderColor: "var(--cy)", color: "var(--cy)" } : {}}>⌖ Prospettiva</button>
                    {persp && (
                      <>
                        <button className="cal-btn" disabled={warping} onClick={applyPerspective} style={{ borderColor: "var(--grn)", color: "var(--grn)" }}>{warping ? "Elaboro…" : "Applica raddrizzamento"}</button>
                        <button className="cal-btn" onClick={() => { setPersp(false); setCornersByFace((p) => ({ ...p, [face]: DEF_CORNERS })); }}>Annulla</button>
                      </>
                    )}
                  </div>
                  {persp && <div className="cal-mini">Trascina i 4 pallini ciano esattamente sui 4 angoli della carta, poi premi Applica: la foto viene raddrizzata e ritagliata alle proporzioni esatte.</div>}
                  <div className="cal-row" style={{ marginTop: 8 }}>
                    <button className="cal-btn" disabled={whiteResult && whiteResult.loading} onClick={analyzeWhitening} style={{ borderColor: "var(--mg)", color: "var(--mg)" }}><ScanLine size={14} /> {whiteResult && whiteResult.loading ? "Analizzo…" : "Analizza whitening bordi"}</button>
                  </div>
                  {whiteResult && whiteResult.error && <div className="cal-mini" style={{ color: "var(--yl)" }}>Analisi non riuscita. Carica e raddrizza prima la foto, e posiziona i crocini sul bordo.</div>}
                  {whiteResult && whiteResult.sides && (
                    <div className="cal-ro" style={{ marginTop: 8 }}>
                      <div className="k">Whitening rilevato (indicativo)</div>
                      <div style={{ fontFamily: "'Space Mono',monospace", fontSize: 12, marginTop: 4, color: "var(--txt)" }}>
                        Bordi — sx {whiteResult.sides.sx.toFixed(1)}% · dx {whiteResult.sides.dx.toFixed(1)}% · alto {whiteResult.sides.alto.toFixed(1)}% · basso {whiteResult.sides.basso.toFixed(1)}%
                      </div>
                      {whiteResult.corners && (
                        <div style={{ fontFamily: "'Space Mono',monospace", fontSize: 12, marginTop: 3, color: "var(--txt)" }}>
                          Angoli — alto-sx {whiteResult.corners.tl.toFixed(1)}% · alto-dx {whiteResult.corners.tr.toFixed(1)}% · basso-sx {whiteResult.corners.bl.toFixed(1)}% · basso-dx {whiteResult.corners.br.toFixed(1)}%
                        </div>
                      )}
                      <div style={{ fontSize: 13, marginTop: 6 }}>Bordi suggerito <b style={{ color: "var(--cy)" }}>{whiteResult.g}</b>{whiteResult.gCorner != null ? <> · Angoli suggerito <b style={{ color: "var(--cy)" }}>{whiteResult.gCorner}</b></> : null}</div>
                      <div className="cal-row" style={{ marginTop: 8 }}>
                        <button className="cal-btn" style={{ padding: "5px 10px", fontSize: 12 }} onClick={() => setCond((p) => ({ ...p, edges: whiteResult.g }))}>Applica {whiteResult.g} a Bordi</button>
                        {whiteResult.gCorner != null && <button className="cal-btn" style={{ padding: "5px 10px", fontSize: 12 }} onClick={() => setCond((p) => ({ ...p, corners: whiteResult.gCorner }))}>Applica {whiteResult.gCorner} a Angoli</button>}
                      </div>
                      <div className="cal-mini" style={{ marginTop: 6 }}>Rileva il whitening sui bordi colorati (retro blu, cornici scure) e lo scompone per lato e per angolo. Posiziona i crocini sul bordo esterno e raddrizza la foto; riflessi e glare possono falsare la stima. Graffi, print line e arrotondamento angoli non sono rilevabili da foto: quelli restano da ispezionare a mano.</div>
                    </div>
                  )}
                </>
              )}
            </>
          ) : (
            <>
              <div className="cal-hint">Misura con righello o calibro i 4 bordi del fronte (in mm). Il retro è facoltativo ma incide sul grado.</div>
              <div className="cal-grid">
                {[["l", "Bordo sinistro"], ["r", "Bordo destro"], ["t", "Bordo alto"], ["b", "Bordo basso"]].map(([k, lab]) => (
                  <div className="cal-field" key={k}>
                    <label>{lab} (mm)</label>
                    <input className="cal-input" type="number" step="0.1" value={m[k]} onChange={(e) => setM((p) => ({ ...p, [k]: e.target.value }))} />
                  </div>
                ))}
              </div>
              <div className="cal-mini">Retro (facoltativo)</div>
              <div className="cal-grid" style={{ marginTop: 6 }}>
                {[["bl", "Retro sx"], ["br", "Retro dx"], ["bt", "Retro alto"], ["bb", "Retro basso"]].map(([k, lab]) => (
                  <div className="cal-field" key={k}>
                    <label>{lab} (mm)</label>
                    <input className="cal-input" type="number" step="0.1" placeholder="—" value={m[k]} onChange={(e) => setM((p) => ({ ...p, [k]: e.target.value }))} />
                  </div>
                ))}
              </div>
            </>
          )}

          {/* readout ratios */}
          <div className="cal-readout">
            <div className="cal-ro"><div className="k">{mode === "foto" ? (face === "front" ? "Fronte · " : "Retro · ") : ""}Sinistra / Destra</div><div className="v">{curR.lr != null ? fmtRatio(curR.lr) : "—"}</div></div>
            <div className="cal-ro"><div className="k">{mode === "foto" ? (face === "front" ? "Fronte · " : "Retro · ") : ""}Alto / Basso</div><div className="v">{curR.tb != null ? fmtRatio(curR.tb) : "—"}</div></div>
          </div>
          {mode === "foto" && curImg && !curErr && (
            <div className="cal-ro" style={{ marginTop: 10 }}>
              <div className="k" style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                Regolazione fine & aggancio bordi
                <button className="cal-btn" style={{ padding: "4px 9px", fontSize: 12, borderColor: "var(--cy)", color: "var(--cy)" }} onClick={snapEdges}><Crosshair size={13} /> Aggancia ai bordi</button>
              </div>
              <div style={{ fontFamily: "'Space Mono',monospace", fontSize: 12, marginTop: 6, color: "var(--txt)" }}>
                Sx/Dx {curR.lr != null ? fmtRatio(curR.lr) : "—"}
                {curR.lr != null && (curLines.il - curLines.ol).toFixed(4) !== (curLines.or - curLines.ir).toFixed(4) ? ` · più stretto a ${(curLines.il - curLines.ol) < (curLines.or - curLines.ir) ? "sx" : "dx"}` : ""}
                {"  ·  "}Alto/Basso {curR.tb != null ? fmtRatio(curR.tb) : "—"}
              </div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 7, marginTop: 8 }}>
                {[{ l: "Sx est", k: "ol" }, { l: "Sx int", k: "il" }, { l: "Dx int", k: "ir" }, { l: "Dx est", k: "or" }].map((s) => (
                  <div key={s.k} style={{ display: "flex", alignItems: "center", gap: 3 }}>
                    <button className="cal-btn" style={{ padding: "3px 8px", fontSize: 14 }} onClick={() => nudge(s.k, -0.002)}>◀</button>
                    <span style={{ fontSize: 10.5, fontFamily: "'Space Mono',monospace", minWidth: 40, textAlign: "center", color: "var(--mut)" }}>{s.l}</span>
                    <button className="cal-btn" style={{ padding: "3px 8px", fontSize: 14 }} onClick={() => nudge(s.k, 0.002)}>▶</button>
                  </div>
                ))}
              </div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 7, marginTop: 6 }}>
                {[{ l: "Alto est", k: "ot" }, { l: "Alto int", k: "it" }, { l: "Basso int", k: "ib" }, { l: "Basso est", k: "ob" }].map((s) => (
                  <div key={s.k} style={{ display: "flex", alignItems: "center", gap: 3 }}>
                    <button className="cal-btn" style={{ padding: "3px 8px", fontSize: 14 }} onClick={() => nudge(s.k, -0.002)}>◀</button>
                    <span style={{ fontSize: 10.5, fontFamily: "'Space Mono',monospace", minWidth: 40, textAlign: "center", color: "var(--mut)" }}>{s.l}</span>
                    <button className="cal-btn" style={{ padding: "3px 8px", fontSize: 14 }} onClick={() => nudge(s.k, 0.002)}>▶</button>
                  </div>
                ))}
              </div>
              <div className="cal-mini" style={{ marginTop: 6 }}>"Aggancia ai bordi" rifinisce i crocini sullo spigolo più vicino (cerca entro un piccolo intorno, non salta lontano); poi usa ◀▶ per la precisione al pixel. Funziona meglio su foto raddrizzata.</div>
            </div>
          )}
          {/* voto automatico da centratura */}
          <div className="cal-ro" style={{ marginTop: 10, display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
            <Crosshair size={16} style={{ color: "var(--cy)", flex: "none" }} />
            <div style={{ flex: 1, minWidth: 160 }}>
              <div className="k">Voto automatico dalla centratura</div>
              <div style={{ fontFamily: "'Space Mono',monospace", fontSize: 13, marginTop: 3, color: "var(--txt)" }}>
                PSA fino a <b>{psaCent}</b> · subgrade centratura BGS <b>{bgsCent % 1 ? bgsCent.toFixed(1) : bgsCent}</b>
              </div>
            </div>
          </div>
          <div className="cal-mini">È il tetto massimo: la condizione qui sotto può solo abbassarlo.</div>
        </div>

        {/* ===== 2. PROPORZIONI / TRIMMING ===== */}
        <div className="cal-section">
          <div className="cal-step"><div className="cal-stepn">2</div><div className="cal-stept">Proporzioni carta</div></div>
          <div className="cal-hint">Facoltativo. Misura il taglio esterno della carta: lo standard è 63,5 × 88,9 mm. Una carta sotto-misura segnala un possibile taglio (trim) → rifiuto in gradazione.</div>
          <div className="cal-grid">
            <div className="cal-field"><label>Larghezza (mm)</label><input className="cal-input" type="number" step="0.1" placeholder="63.5" value={dim.w} onChange={(e) => setDim((p) => ({ ...p, w: e.target.value }))} /></div>
            <div className="cal-field"><label>Altezza (mm)</label><input className="cal-input" type="number" step="0.1" placeholder="88.9" value={dim.h} onChange={(e) => setDim((p) => ({ ...p, h: e.target.value }))} /></div>
          </div>
          {trim === "trim" && <div className="cal-mini" style={{ color: "var(--mg)" }}><AlertTriangle size={12} style={{ verticalAlign: -2 }} /> Carta sotto-misura: forte rischio di taglio. Probabile rifiuto.</div>}
          {trim === "ok" && <div className="cal-mini" style={{ color: "var(--grn)" }}><Check size={12} style={{ verticalAlign: -2 }} /> Dimensioni entro tolleranza standard.</div>}
        </div>

        {/* ===== 3. CONDIZIONE ===== */}
        <div className="cal-section">
          <div className="cal-step"><div className="cal-stepn">3</div><div className="cal-stept">Condizione</div></div>
          <div className="cal-hint">Facoltativo. Il voto qui sopra presuppone già condizioni perfette (10): questa parte non si ricava dai bordi — una carta ben centrata può avere un angolo o una superficie rovinati. Abbassa una voce solo se, con luce forte e lente, vedi davvero quel difetto; il grado finale scenderà di conseguenza.</div>
          {Object.entries(FACTORS).map(([key, f]) => {
            const Icon = f.icon;
            return (
              <div key={key}>
                <div className="cal-factorhead"><Icon className="ic" /> {f.label}</div>
                <div className="cal-opts">
                  {f.opts.map((o) => (
                    <button key={o.g} className={`cal-opt ${cond[key] === o.g ? "on" : ""}`} onClick={() => { setCond((p) => ({ ...p, [key]: o.g })); setCondTouched(true); }}>
                      <span className="tag">{o.g % 1 ? o.g.toFixed(1) : o.g}</span>
                      <span className="desc">{o.t}</span>
                    </button>
                  ))}
                </div>
              </div>
            );
          })}
        </div>

        {/* ===== 4. SALVA E CONFRONTA ===== */}
        <div className="cal-section">
          <div className="cal-step"><div className="cal-stepn">4</div><div className="cal-stept">Salva e confronta</div></div>
          <div className="cal-hint">Salva il risultato corrente per confrontare più carte. Su file aperto localmente la lista può azzerarsi tra una sessione e l'altra: usa <b>Backup / Ripristino</b> qui sotto per non perderla.</div>
          <div className="cal-saverow">
            <input className="cal-input" placeholder="Nome carta (es. Charizard 4/102)" value={cardName} onChange={(e) => setCardName(e.target.value)} />
            <button className="cal-btn" onClick={saveCard}><Save size={14} /> Salva</button>
          </div>
          <div className="cal-saved">
            {savedCards.length === 0 && <div className="cal-empty">Nessuna carta salvata. Compila i passaggi sopra e premi Salva.</div>}
            {savedCards.map((c) => {
              const col = { great: "var(--grn)", good: "var(--cy)", ok: "var(--yl)", bad: "var(--mg)" }[c.tone];
              return (
                <div key={c.id} className="cal-card" style={{ borderLeftColor: col }}>
                  <span className="nm">{c.name}</span>
                  <span className="gr">PSA <b>{c.psa}</b></span>
                  <span className="gr">BGS <b>{c.bgs}{c.black ? " BL" : ""}</b></span>
                  <span className="gr" style={{ color: "var(--mut2)" }}>{c.front}</span>
                  <button className="rm" onClick={() => removeCard(c.id)} aria-label="Elimina"><Trash2 size={15} /></button>
                </div>
              );
            })}
          </div>
          {/* backup esporta/importa */}
          <div className="cal-row" style={{ marginTop: 10 }}>
            <button className="cal-btn" style={{ padding: "5px 10px", fontSize: 12 }} onClick={() => setBackup(backup === null ? JSON.stringify(savedCards) : null)}>{backup === null ? "Backup / Ripristino" : "Chiudi"}</button>
          </div>
          {backup !== null && (
            <div style={{ marginTop: 8 }}>
              <div className="cal-mini" style={{ marginBottom: 6 }}>Copia questo testo e salvalo (es. nelle Note) per non perdere la lista. Per ripristinare, incolla qui un backup e premi Importa.</div>
              <textarea className="cal-input" style={{ width: "100%", minHeight: 90, fontFamily: "'Space Mono',monospace", fontSize: 11, resize: "vertical" }} value={backup} onChange={(e) => setBackup(e.target.value)} />
              <div className="cal-row" style={{ marginTop: 8 }}>
                <button className="cal-btn" style={{ padding: "5px 10px", fontSize: 12 }} onClick={() => { try { navigator.clipboard?.writeText(backup); } catch (e) {} }}>Copia</button>
                <button className="cal-btn" style={{ padding: "5px 10px", fontSize: 12, borderColor: "var(--grn)", color: "var(--grn)" }} onClick={() => { try { const arr = JSON.parse(backup); if (Array.isArray(arr)) { setSavedCards(arr); persist(arr); setBackup(null); } } catch (e) {} }}>Importa</button>
              </div>
            </div>
          )}
        </div>

        {/* ===== 5. VALORE DI MERCATO ===== */}
        <div className="cal-section">
          <div className="cal-step"><div className="cal-stepn">5</div><div className="cal-stept">Valore di mercato</div></div>
          <div className="cal-hint">Dai dati della carta e dal grado, apri i prezzi reali. L'app non raschia i prezzi (eBay non lo consente): costruisce la ricerca giusta dei <b>venduti</b> e te la apre.</div>
          <div className="cal-field" style={{ marginBottom: 8 }}>
            <label>Carta — nome, set, numero</label>
            <input className="cal-input" style={{ fontFamily: "'Inter',sans-serif", fontSize: 14 }} placeholder="es. Yanmega ex Destined Rivals 228/182" value={val.q} onChange={(e) => setVal((p) => ({ ...p, q: e.target.value }))} />
          </div>
          <div className="cal-row" style={{ gap: 8 }}>
            <select className="cal-input" style={{ flex: 1, minWidth: 0 }} value={val.lang} onChange={(e) => setVal((p) => ({ ...p, lang: e.target.value }))}>
              <option value="it">Italiano</option>
              <option value="en">Inglese</option>
              <option value="jp">Giapponese</option>
            </select>
            <select className="cal-input" style={{ flex: 1, minWidth: 0 }} value={val.company} onChange={(e) => setVal((p) => ({ ...p, company: e.target.value, grade: "10" }))}>
              <option value="PSA">PSA</option>
              <option value="BGS">BGS</option>
              <option value="Raw">Grezza</option>
            </select>
            {val.company !== "Raw" && (
              <select className="cal-input" style={{ flex: 1, minWidth: 0 }} value={val.grade} onChange={(e) => setVal((p) => ({ ...p, grade: e.target.value }))}>
                {gradeOpts.map((g) => <option key={g} value={g}>{g}</option>)}
              </select>
            )}
          </div>
          {trim !== "trim" && (
            <button className="cal-btn" style={{ marginTop: 8, padding: "5px 10px", fontSize: 12 }} onClick={() => setVal((p) => ({ ...p, company: "PSA", grade: String(psa % 1 ? psa.toFixed(1) : psa) }))}>
              Usa il grado stimato: PSA {psa % 1 ? psa.toFixed(1) : psa}
            </button>
          )}
          <div className="cal-row" style={{ marginTop: 10 }}>
            <a className="cal-btn cal-link" href={ebayUrl} target="_blank" rel="noreferrer" style={{ borderColor: "var(--cy)", color: "var(--cy)" }}>eBay venduti →</a>
          </div>
          <div className="cal-mini">eBay mostra i prezzi <b>venduti</b> (LH_Sold), ordinati dai più recenti. Per le carte italiane i comparabili gradati sono pochi: prova anche in inglese/giapponese come riferimento.</div>
        </div>

        {/* note metodologiche */}
        <div className="cal-note">
          <b>Soglie usate.</b> PSA — fronte: 10 ≤ 55/45, 9 ≤ 60/40, 8 ≤ 65/35, 7 ≤ 70/30 (il 10 è sceso da 60/40 a 55/45 a inizio 2025); retro: 75/25 per il 10, 90/10 per 9–7. Il grado PSA è limitato dal fattore più debole tra centratura, angoli, bordi e superficie. BGS — subgrade centratura fronte (scala ufficiale Beckett): 10 = 50/50, 9.5 = 50/50 su un asse e 55/45 sull'altro, 9 = 55/45 su entrambi, 8 = 60/40, 7 = 65/35; il retro è più tollerante (60/40 o meglio non abbassa il voto). Il grado finale non supera di norma il subgrade più basso +0.5, e il Black Label richiede quattro 10. PSA e BGS non pubblicano le formule esatte di combinazione: i gradi finali sono stime di pre-screening, non un esito garantito. Angoli, bordi e superficie sono un'autovalutazione guidata e dipendono dalla tua ispezione.
        </div>
      </div>
    </div>
  );
}


const __root = ReactDOM.createRoot(document.getElementById('root'));
__root.render(<Calibro />);

</script>
</body>
</html>
